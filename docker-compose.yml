services:
    client:
        build: ./client
        volumes:
            - client_build:/app/dist

    server:
        build: ./server
        environment:
            - SECRET_KEY=${SECRET_KEY}
            - DATABASE_URI=${DATABASE_URI}
        depends_on:
            - mysql

    mysql:
        image: mysql:8
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: true
            MYSQL_DATABASE: db_eduia
        volumes:
            - db_data:/var/lib/mysql

    nginx:
        image: nginx:alpine
        ports:
            - '3000:80'
        volumes:
            - client-build:/usr/share/nginx/html
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - server

volumes:
    client_build:
    db_data:
