services:
    server:
        build: ./server
        volumes:
            - ./server:/app
        environment:
            FLASK_ENV: development
            FLASK_APP: app.py
            FLASK_DEBUG: 1
            SECRET_KEY: ${SECRET_KEY}
            DATABASE_URI: ${DATABASE_URI}
        ports:
            - '5000:5000'
        depends_on:
            database:
                condition: service_healthy
    
    client:
        build: ./client
        volumes:
            - ./client:/app
            - /app/node_modules
        environment:
            - CHOKIDAR_USEPOLLING=true
        ports:
            - '3000:3000'
    
    nginx:
        image: nginx:alpine
        ports:
            - '80:80'
        volumes:
            - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - server
            - client
    
    database:
        image: mysql:8
        restart: always
        environment:
            MYSQL_ALLOW_EMPTY_PASSWORD: true
            MYSQL_DATABASE: db_dev
        ports:
            - '3306:3306'
        volumes:
            - db_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    db_data:
